<div class="modal-overlay" data-modal="modal-1">
  <div class="modal">
    <div class="modal-button">
      <button class="modal-close" type="button" data-modal-close>
        <svg width="15" height="15">
          <use href="/img/symbol-defs.svg#icon-close"></use>
        </svg>
      </button>
    </div>
    <p class="modal-text">Join Now!</p>
    <div class="modal-text-wrapper">
      <p class="text-one">One Session</p>
      <p class="text-prise">$10</p>
    </div>
    <form class="modal-form">
      <div class="modal-form-modern">
        <label for="name" class="lable-modal">Your Name</label>
        <div class="modal-wrapper">
          <input
            placeholder="Enter your name"
            type="text"
            name="name"
            class="input-text"
            id="name"
            required
          />
        </div>
      </div>
      <div class="modal-email-phone">
        <div class="modal-form-modern leng">
          <label for="email" class="lable-modal">Email</label>
          <div class="modal-wrapper">
            <input
              placeholder="Enter your email"
              type="email"
              name="email"
              class="input-text"
              id="email"
              required
            />
          </div>
        </div>
        <div class="modal-form-modern leng">
          <label for="tel" class="lable-modal">Phone number</label>
          <div class="modal-wrapper">
            <input
              placeholder="Enter your phone number"
              type="tel"
              name="tel"
              class="input-text"
              maxlength="10"
              minlength="4"
              id="tel"
              required
            />
          </div>
        </div>
      </div>
      <div class="modal-send-button">
        <button type="submit" class="modal-send">Go to checkout</button>
      </div>
    </form>
  </div>
</div>
